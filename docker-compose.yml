version: '3.8'

services:
  tts-api:
    image: ghcr.io/aleckarfonta/speaker:latest
    build: .
    ports:
      - "8012:8000"
    environment:
      - ENVIRONMENT=development
      - TORCHAUDIO_BACKEND=soundfile
      - PYTHONPATH=/app:/app/GLM-TTS
      - HF_HOME=/app/model_cache/huggingface
      - TORCH_HOME=/app/model_cache/torch
      - TRANSFORMERS_CACHE=/app/model_cache/transformers
      - NVIDIA_VISIBLE_DEVICES=all
      - STT_API_URL=http://192.168.1.196:8603/v1/audio/transcriptions
      - STT_API_KEY=your-api-key
      - COQUI_TOS_AGREED=1
      - ORT_LOGGING_LEVEL=3 # Suppress ONNX fallback warnings (campplus model)
      # TTS Backend for this container: "glm-tts" or "xtts"
      # Note: MOSS runs via the separate moss-tts container (port 8013)
      # The frontend proxies to moss-tts by default via TTS_BACKEND_HOST
      - TTS_BACKEND=stub
      # === OPTIMAL CONFIG FROM PARAMETER SWEEP ===
      # Best balanced: 5.95x speed, 91.6% accuracy
      - GLM_TTS_QUANTIZATION=4bit
      - GLM_TTS_ATTENTION=flash_attention_2
      - GLM_TTS_FLOW_STEPS=13
      - GLM_TTS_SAMPLING=10
      - GLM_TTS_TORCH_COMPILE=false # Not needed with vLLM
      - GLM_TTS_VLLM_QUANTIZATION=none
      # Use vLLM engine for high-performance inference
      - GLM_TTS_ENGINE=vllm
      # Force vLLM V0 engine — V1 spawns an EngineCore subprocess that loads torchcodec
      # which crashes on this system (undefined symbol in libtorchcodec_core*.so)
      - VLLM_USE_V1=0
      #
      # === RTX 5090 Blackwell Optimizations ===
      - GLM_TTS_FLOW_DTYPE=fp32
      - GLM_TTS_CFG_RATE=0.7
      - GLM_TTS_COMPILE_FLOW=true
      - GLM_TTS_COMPILE_VOCODER=true
      #
      # GLM-TTS LLM Optimization (uncomment to customize):
      # GLM_TTS_DTYPE: fp32, fp16, bf16 (default: fp16)
      # - GLM_TTS_DTYPE=fp16
      # GLM_TTS_QUANTIZATION: none, 4bit, 8bit (default: none) - 4bit ~3x faster
      # - GLM_TTS_QUANTIZATION=4bit
      # GLM_TTS_ATTENTION: eager, sdpa, flash_attention_2, flash_attention_3 (default: eager)
      # - GLM_TTS_ATTENTION=sdpa
      #
      # Speed Tuning (uncomment to customize):
      # GLM_TTS_FLOW_STEPS: 1-20, lower=faster (default: 10, try 5-8 for speed)
      # - GLM_TTS_FLOW_STEPS=8
      # GLM_TTS_SAMPLING: top-k sampling, lower=faster (default: 25, try 15-20)
      # - GLM_TTS_SAMPLING=20
      # GLM_TTS_MAX_TOKEN_RATIO: max audio tokens per text char (default: 20, try 15)
      # - GLM_TTS_MAX_TOKEN_RATIO=15

      - GLM_TTS_MAX_SEC_PER_WORD=4.0 # Max seconds per word for slow speech
      - GLM_TTS_GARBAGE_THRESHOLD=1.5 # Threshold above which audio is trimmed
      - GLM_TTS_SILENCE_THRESHOLD_DB=-40 # dB threshold for trailing silence
      - GLM_TTS_MAX_TOKEN_RATIO=30.0 # Max audio tokens per text character
      # AI Character Analysis (LLM endpoint for audiobook feature)
      - INSTRUCT_LLM_API_URL=http://192.168.1.196:8600/v1/chat/completions
      #- INSTRUCT_LLM_MODEL=Huihui-Qwen3-Next-80B-A3B-Thinking-abliterated
      - INSTRUCT_LLM_MODEL=Qwen3-Coder-Next
      - INSTRUCT_LLM_API_KEY=placeholder-api-key
      # ComfyUI Visual Generation
      - COMFYUI_API_URL=http://192.168.1.77:8188
      - COMFYUI_VISUAL_MODE=video
      - COMFYUI_IMAGE_WIDTH=1920
      - COMFYUI_IMAGE_HEIGHT=1080
      - COMFYUI_VIDEO_FPS=10
    volumes:
      # Live-mount application code — changes picked up on container restart, no rebuild needed
      - ./app:/app/app
      # Mount GLM-TTS model checkpoints (download separately: ~8GB)
      - ./GLM-TTS/ckpt:/app/GLM-TTS/ckpt:ro
      # Shared data volumes (same as moss-tts for cross-container access)
      - ./data/audiobooks:/app/data/audiobooks
      - ./data/voices:/app/data/voices
      - ./output:/app/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    command: >
      bash -c "./scripts/start.sh"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - tts-network

  moss-tts:
    build:
      context: .
      dockerfile: Dockerfile.moss
    # No profile gate — MOSS is the default TTS backend
    ports:
      - "8013:8000"
    environment:
      - MOSS_MODEL_ID=OpenMOSS-Team/MOSS-TTS
      - MOSS_VOICE_GEN_MODEL=OpenMOSS-Team/MOSS-VoiceGenerator
      - MOSS_ENABLE_VOICE_GEN=true
      - MOSS_QUANTIZE=4bit
      - VOICES_DIR=/app/data/voices
      - HF_HOME=/root/.cache/huggingface
      - NVIDIA_VISIBLE_DEVICES=0,1,3
      - CUDA_VISIBLE_DEVICES=0,1,2
      - MOSS_RT_DEVICES=0,2  # cuda:0 (5070 Ti) + cuda:2 (5060 Ti GPU3) for dual RT streaming
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # AI Character Analysis + Visual Generation (same as tts-api)
      - INSTRUCT_LLM_API_URL=http://192.168.1.196:8600/v1/chat/completions
      - INSTRUCT_LLM_MODEL=Qwen3-Coder-Next
      - INSTRUCT_LLM_API_KEY=placeholder-api-key
      - COMFYUI_API_URL=http://192.168.1.77:8188
      - COMFYUI_IMAGE_WIDTH=1920
      - COMFYUI_IMAGE_HEIGHT=1080
      - COMFYUI_VIDEO_FPS=10
    volumes:
      # Live-mount application code — changes picked up on container restart, no rebuild needed
      - ./app:/app/app
      - ./output:/app/output
      - ./data/voices:/app/data/voices
      - ./data/audiobooks:/app/data/audiobooks
      - moss_hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1", "3"]
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    networks:
      - tts-network

  frontend:
    image: ghcr.io/aleckarfonta/speaker-frontend:latest
    build: ./frontend
    ports:
      - "3012:80"
    environment:
      # TTS backend to proxy to. Options:
      #   moss-tts:8000   → MOSS-TTS (default)
      #   tts-api:8000    → GLM-TTS
      #   qwen-tts:8000   → Qwen3-TTS (qwen profile)
      - TTS_BACKEND_HOST=moss-tts:8000
      # Audiobook API lives on tts-api (separated from TTS engine)
      - AUDIOBOOK_BACKEND_HOST=tts-api:8000
    depends_on:
      - moss-tts
    networks:
      - tts-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Prometheus for metrics collection
  prometheus:
    build:
      context: ./k8s/monitoring
      dockerfile: Dockerfile.prometheus
    ports:
      - "9199:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - tts-network
    depends_on:
      - tts-api
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Grafana for metrics visualization
  grafana:
    build:
      context: ./k8s/monitoring
      dockerfile: Dockerfile.grafana
    ports:
      - "3333:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - tts-network
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  prometheus_data:
  grafana_data:
  moss_hf_cache:


networks:
  tts-network:
    driver: bridge
